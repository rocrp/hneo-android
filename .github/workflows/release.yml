name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Compute build number
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "VERSION_NAME=0.1.$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "APK_NAME=hneo-0.1.$BUILD_NUMBER.apk" >> "$GITHUB_ENV"

      - name: Check if tag exists
        run: |
          if git rev-parse "build-$BUILD_NUMBER" >/dev/null 2>&1; then
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Build release APK
        if: env.SKIP != 'true'
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_BASE64 != '' && '/tmp/release.keystore' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Prepare APK
        if: env.SKIP != 'true'
        run: cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"

      - name: Generate changelog
        if: env.SKIP != 'true'
        run: |
          LAST_TAG=$(git describe --tags --match "build-*" --abbrev=0 HEAD~ 2>/dev/null || true)
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log "$LAST_TAG"..HEAD --pretty=format:'- %s')
          else
            CHANGELOG=$(git log -n 10 --pretty=format:'- %s')
          fi
          echo "CHANGELOG<<CHANGELOG_EOF" >> "$GITHUB_ENV"
          echo "$CHANGELOG" >> "$GITHUB_ENV"
          echo "CHANGELOG_EOF" >> "$GITHUB_ENV"

      - name: Create tag
        if: env.SKIP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "build-$BUILD_NUMBER" -m "Build $BUILD_NUMBER"
          git push origin "build-$BUILD_NUMBER"

      - name: Create GitHub Release
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "build-$BUILD_NUMBER" "$APK_NAME" \
            --title "v$VERSION_NAME" \
            --notes "$CHANGELOG"
